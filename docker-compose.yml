services:
  postgres:
    image: postgres:17-alpine
    container_name: agent-flow-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_flow}
      POSTGRES_USER: ${POSTGRES_USER:-agent_flow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_flow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agent-flow-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent-flow-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://${POSTGRES_USER:-agent_flow}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-agent_flow}?sslmode=disable
      REDIS_URL: redis://redis:6379
      RUN_SEED: ${RUN_SEED:-true}
      CLAUDE_TIMEOUT: ${CLAUDE_TIMEOUT:-10m}
      CLAUDE_DEFAULT_MAX_RETRIES: ${CLAUDE_DEFAULT_MAX_RETRIES:-5}
      TASK_CONCURRENCY: ${TASK_CONCURRENCY:-1}
      ALLOW_ORIGINS: ${ALLOW_ORIGINS:-http://localhost:3000,http://localhost:5173}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      # 掛載宿主機 home 目錄，讓 claude CLI 能存取本地專案
      - /home:/home
      # 掛載 claude config（已登入的帳號）
      - ${HOME}/.claude:/root/.claude:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: agent-flow-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-3001}
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
